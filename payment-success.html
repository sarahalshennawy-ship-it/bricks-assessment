<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Successful — Bricks & Co</title>
<style>
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#FDF8F4;min-height:100vh;display:flex;align-items:center;justify-content:center;margin:0;padding:20px}
  .card{max-width:480px;text-align:center;background:#fff;border-radius:16px;padding:44px 32px;box-shadow:0 4px 24px rgba(0,0,0,0.06)}
  .check{font-size:52px;margin-bottom:10px}
  h1{color:#2C1F17;font-size:22px;margin-bottom:12px}
  p{color:#666;font-size:15px;line-height:1.6;margin-bottom:8px}
  .note{font-size:13px;color:#999;margin-top:24px}
</style>
</head>
<body>
  <div class="card">
    <div class="check">✅</div>
    <h1>Payment received — thank you!</h1>
    <p>We're sending your files to the email address you provided. This usually arrives within a minute or two.</p>
    <p class="note">Didn't get it? Check your spam folder, or WhatsApp us and we'll resend it right away.</p>
  </div>
</body>
</html>
